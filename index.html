<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>メニュー切替</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; }
        .btn-primary { background-color: #417690; color: white; transition: 0.2s; }
        .btn-primary:active { background-color: #2c5163; transform: scale(0.98); }
    </style>
</head>
<body class="p-4">

    <div class="max-w-md mx-auto bg-white rounded-xl shadow-md overflow-hidden p-6">
        <h1 class="text-xl font-bold text-gray-800 mb-6 border-b pb-2">校舎・学年設定</h1>

        <div class="mb-5">
            <label class="block text-sm font-medium text-gray-700 mb-2">所属校舎</label>
            <select id="campus_select" class="block w-full p-3 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
                <option value="">選択してください</option>
            </select>
        </div>

        <div class="mb-8">
            <label class="block text-sm font-medium text-gray-700 mb-2">学年</label>
            <div class="grid grid-cols-2 gap-2" id="grade_group">
                <button type="button" onclick="selectGrade('中3')" class="grade-btn border p-3 rounded-md text-gray-600 hover:bg-gray-50">中3</button>
                <button type="button" onclick="selectGrade('高1')" class="grade-btn border p-3 rounded-md text-gray-600 hover:bg-gray-50">高1</button>
                <button type="button" onclick="selectGrade('高2')" class="grade-btn border p-3 rounded-md text-gray-600 hover:bg-gray-50">高2</button>
                <button type="button" onclick="selectGrade('高3')" class="grade-btn border p-3 rounded-md text-gray-600 hover:bg-gray-50">高3</button>
                <button type="button" onclick="selectGrade('卒')" class="grade-btn border p-3 rounded-md text-gray-600 hover:bg-gray-50 col-span-2">既卒・その他</button>
            </div>
        </div>

        <button id="submit_btn" onclick="submitRegistration()" class="w-full btn-primary py-4 rounded-lg font-bold text-lg shadow-lg">
            設定を反映する
        </button>
    </div>

    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
        const campusList = [
            { code: "G01", name: "太田HS" },
            { code: "G02", name: "館林HS" },
            { code: "G03", name: "前橋中央HS" },
            { code: "G04", name: "高崎HS" },
            { code: "G05", name: "伊勢崎HS" },
            { code: "G06", name: "桐生HS" },
            { code: "T01", name: "足利HS" },
            { code: "T02", name: "佐野HS" },
            { code: "T03", name: "栃木HS" },
            { code: "T04", name: "小山HS" },
            { code: "T05", name: "宇都宮中央HS" },
            { code: "S01", name: "熊谷HS" },
            { code: "S02", name: "深谷HS" },  
        ];

        let selectedGrade = "";

        // ページ読み込み時に校舎セレクトボックスを動的に生成
        function initCampusSelect() {
            const selectEl = document.getElementById('campus_select');
            campusList.forEach(campus => {
                const opt = document.createElement('option');
                opt.value = campus.code;
                opt.textContent = campus.name;
                selectEl.appendChild(opt);
            });
        }

        // LIFF初期化
        liff.init({ liffId: "2008539128-YNBAMh6F" }).then(() => {
            if (!liff.isLoggedIn()) {
                liff.login();
            }
            // LIFF準備完了後にセレクトボックスを初期化
            initCampusSelect();
        }).catch((err) => {
            console.error("LIFF Initialization failed ", err);
            // 万が一LIFFが無くてもセレクトボックスだけは動かす
            initCampusSelect();
        });

        // 学年ボタン選択時のスタイル切り替え
        function selectGrade(grade) {
            selectedGrade = grade;
            document.querySelectorAll('.grade-btn').forEach(btn => {
                btn.classList.remove('bg-blue-100', 'border-blue-500', 'text-blue-700', 'font-bold');
            });
            event.currentTarget.classList.add('bg-blue-100', 'border-blue-500', 'text-blue-700', 'font-bold');
        }

        // 送信処理
        function submitRegistration() {
            const campusSelect = document.getElementById('campus_select');
            const campusCode = campusSelect.value;

            if (!campusCode || !selectedGrade) {
                alert("校舎と学年を両方選択してください。");
                return;
            }

            const btn = document.getElementById('submit_btn');
            btn.disabled = true;
            btn.innerText = "処理中...";

            // ユーザー自身のメッセージとしてトークルームにポスト
            liff.sendMessages([
                {
                    type: 'text',
                    text: `【校舎登録】校舎コード:${campusCode} / 学年:${selectedGrade}`
                }
            ]).then(() => {
                liff.closeWindow();
            }).catch((err) => {
                console.error('Error sending message:', err);
                alert("メッセージの送信に失敗しました。トークルームへのメッセージ送信権限を確認してください。");
                btn.disabled = false;
                btn.innerText = "設定を反映する";
            });
        }
    </script>
</body>
</html>
